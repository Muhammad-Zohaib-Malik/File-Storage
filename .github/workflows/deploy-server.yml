name: Deploy StorageApp Backend

on:
  push:
    branches:
      - main        # Trigger workflow on push to main branch
    paths:
      - 'server/**' # Only run if changes are in client/ folder
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.236.246.83
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # This 'script' block replaces your 'run' block
          script: |
            # 1. Force load the user profile to find 'npm' and 'pm2'
            # This is the most common fix for 'command not found' in SSH actions
            [ -f ~/.profile ] && . ~/.profile
            [ -f ~/.bashrc ] && . ~/.bashrc
            
            set -e
            
            # 2. Navigate to project
            cd /home/ubuntu/File-Storage/
            
            # 3. Pull code
            git pull origin master
            
            # 4. Install dependencies
            # We use 'npm' now that the path is loaded
            npm ci --production --no-audit --no-fund
            
            # 5. Smart Restart
            echo "Reloading StorageApp with PM2..."
            pm2 reload storageApp || pm2 start index.js --name storageApp
            
            echo "StorageApp Backend Deployed Successfully!"
