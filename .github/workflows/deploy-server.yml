name: Deploy StorageApp Backend

on:
  push:
    branches:
      - main        # Trigger workflow on push to main branch
    paths:
      - 'server/**' # Only run if changes are in client/ folder
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.236.246.83
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # This 'script' block replaces your 'run' block
          script: |
            set -e
            
            # 1. ADD THIS LINE: Tells the server where to find node, npm, and pm2
            export PATH=$PATH:/home/ubuntu/.nvm/versions/node/v24.12.0/bin
            
            # 2. Navigate to the project root and pull
            cd /home/ubuntu/File-Storage/
            echo "Pulling latest code..."
            git pull origin master

            # 3. Navigate into the SERVER folder
            cd server
            
            # 4. Install production dependencies
            echo "Installing dependencies..."
            npm ci --production --no-audit --no-fund
            
            # 5. Smart Restart
            echo "Reloading StorageApp with PM2..."
            # Using '||' ensures it starts if it isn't already running
            pm2 reload storageApp || pm2 start index.js --name storageApp
            
            pm2 save
            echo "✅ StorageApp Backend Deployed Successfully!"