name: Deploy Vite Client to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
  workflow_dispatch:
    
jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    env:
      S3_BUCKET_NAME: mystorageapp-frontend
      CLOUDFRONT_DISTRIBUTION_ID: E3GKKIA9RCN7AF
      VITE_GOOGLE_CLIENT_ID: 344318278446-cajt3djqf9ob9s8cg42vcb09q5k8ql65.apps.googleusercontent.com
      VITE_BACKEND_BASE_URL: https://api.storemyfiles.store


    steps:
      # 1️⃣ Checkout repo (this is git clone)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4️⃣ Build Vite app
      - name: Build Project
        run: npm run build

      # 5️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 6️⃣ Upload static files (long cache)
      - name: Upload to S3
        run: |
          aws s3 sync dist/ s3://${S3_BUCKET_NAME}/ --delete


      # 7️⃣ Invalidate CloudFront
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/index.html"
        
        # 8️⃣ Deployment complete
      - name: Deployment Complete
        run: echo "Client Deployed Successfully!"