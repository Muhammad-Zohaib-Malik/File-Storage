name: Deploy Vite Client to AWS

on:
  push:
    branches:
      - main        # Trigger workflow on push to main branch
    paths:
      - 'client/**' # Only run if changes are in client/ folder
  workflow_dispatch:  # Allow manual trigger from GitHub UI
    
jobs:
  deploy:
    runs-on: ubuntu-latest  # Use latest Ubuntu runner

    defaults:
      run:
        working-directory: client  # All run commands start in client folder

    env:
      S3_BUCKET_NAME: mystorageapp-frontend                # Your S3 bucket name
      CLOUDFRONT_DISTRIBUTION_ID: EMY1D6Y5I0J3S         # CloudFront distribution ID
      VITE_GOOGLE_CLIENT_ID: 344318278446-cajt3djqf9ob9s8cg42vcb09q5k8ql65.apps.googleusercontent.com  # Vite env
      VITE_BACKEND_BASE_URL: https://api.storemyfiles.store  # Backend API URL

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4   # Clone your repo to the runner

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24          # Install Node.js v24

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        run: npm ci                 # Clean install using package-lock.json

      # 4️⃣ Build Vite app
      - name: Build Project
        run: npm run build          # Run vite build command

      # 5️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}   # AWS access key from GitHub secrets
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # AWS secret key
          aws-region: ${{ secrets.AWS_REGION }}                 # AWS region

      # 6️⃣ Upload static files to S3
      - name: Upload to S3
        run: |
          aws s3 sync dist/ s3://${S3_BUCKET_NAME}/ --delete
          # Sync dist folder to S3 bucket and remove obsolete files

      # 7️⃣ Invalidate CloudFront cache
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/index.html"
          # Refresh CloudFront cache for index.html

      # 8️⃣ Deployment complete
      - name: Deployment Complete
        run: echo "Client Deployed Successfully!"  # Log success message